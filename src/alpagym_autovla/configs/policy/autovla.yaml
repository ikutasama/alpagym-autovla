# @package policy
kind: autovla

model:
  kind: autovla
  path: ???
  device: cuda
  dtype: bfloat16
  use_cameras:
    - camera_front_wide_120fov
    - camera_cross_left_120fov
    - camera_cross_right_120fov
  input_size: [320, 512]
  num_context_frames: 4
  num_historical_waypoints: 16
  num_future_waypoints: 10
  step_dt_us: 500000
  bundle_config: {}

inference:
  max_batch_size: 1
  sampling:
    top_p: 1.0
    top_k: 0
    temperature: 0.01
    num_traj_samples: 1
    num_traj_sets: 1
    max_generation_length: 2048
    force_determinism: false
    retry_on_nonfinite: true
    diffusion_kwargs:
      noise_level: null
      temperature: null
      int_method: null
      inference_step: null
  return_trace_for_rl: true

trajectory_selector: identity

# AutoVLA-specific settings (consumed by bundle.load_inference_model)
autovla:
  codebook_cache_path: ???  # Path to agent_vocab.pkl from AutoVLA repo
  action_start_id: 151665
  use_cot: false
  trajectory:
    num_poses: 10
    interval_length: 0.5
  video:
    min_pixels: 109760
    max_pixels: 109760
  sample:
    max_length: 2048
    temperature: 0.01
    top_k: 0
    top_p: 1.0
